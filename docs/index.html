<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 博客每日精选</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      text-align: center;
      max-width: 500px;
    }
    h1 { color: #f0f6fc; font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #8b949e; margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      text-decoration: none;
      margin: 0.25rem;
    }
    .rss { background: #238636; color: #fff; }
    .rss:hover { background: #2ea043; }
    .digest { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb; }
    .digest:hover { background: #1f6feb33; }
    .footer { margin-top: 3rem; color: #484f58; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📰 AI 博客每日精选</h1>
    <p>AI-curated daily digest from 90 top tech blogs<br>(Karpathy's HN Popularity Contest 2025)</p>
    <a class="rss" href="feed.xml">📡 RSS 订阅</a>
    <a class="digest" href="index.html">📄 最新摘要</a>
    <div class="footer">
      <p>Powered by Gemini AI · Updated daily at 14:00 CST</p>
    </div>
  </div>
</body>
</html>
